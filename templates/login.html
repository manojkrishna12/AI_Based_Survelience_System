<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GuardAI Monitor</title>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="login-body">

    <div class="login-card animate__animated animate__fadeIn">
        <div class="login-logo">
            <i class="fa-solid fa-shield-halved"></i>
            <h3>GuardAI Portal</h3>
            <p>AI Based Smart Surveillance Monitor</p>
        </div>
        
        <!-- Flash messages inside login card -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} bg-opacity-10 text-white border-0 py-2 small mb-3" style="background-color: rgba(239,68,68,0.15);" role="alert">
                        <i class="fas fa-exclamation-triangle me-2 text-danger"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('auth.login') }}" method="POST" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label small fw-bold">Operator Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" placeholder="Enter username" required value="admin">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label small fw-bold">Secret Access Key</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" placeholder="Enter password" required value="admin123">
                </div>
            </div>
            
            <button type="submit" class="btn btn-login w-100 text-white">
                <i class="fas fa-sign-in-alt me-2"></i>Authenticate System
            </button>
        </form>
        
        <div class="text-center mt-4">
            <span class="text-muted small">Academic B.Tech Mini-Project Evaluation</span>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
